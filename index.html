<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOPHIA-ALIM V.1 | CENTRO DE COMANDO</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffcc; /* Verde Neón / Cian */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            border: 2px solid #00ffcc;
            box-sizing: border-box;
        }
        .header {
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 20px;
        }
        .mantra {
            font-size: 1.2rem;
            color: #ffffff;
            margin: 20px;
            padding: 15px;
            border-top: 1px solid #00ffcc;
            border-bottom: 1px solid #00ffcc;
        }
        .status-box {
            background: rgba(0, 255, 204, 0.1);
            padding: 20px;
            border-radius: 5px;
            width: 80%;
            max-width: 500px;
            text-align: left;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header"> [ SOPHIA — ALIM V.1 ] </div>
    
    <div class="status-box">
        <p><span class="blink">></span> ACCESO AUTORIZADO: <strong>A.A/C.Z</strong></p>
        <p><span class="blink">></span> ESTADO: PROTECCIÓN ACTIVA</p>
        <p><span class="blink">></span> UBICACIÓN: TULANCINGO / CONEXIÓN DIVINA</p>
    </div>

    <div class="mantra">
        "YO SOY LA PUERTA ABIERTA QUE NADIE PUEDE CERRAR"
    </div>

    <div class="status-box" style="margin-top: 10px;">
        <p><strong>MANTRA DEL DÍA:</strong></p>
        <p>~ Yo Soy la paz que sobrepasa todo entendimiento ~</p>
    </div>

    <div class="footer">
        SISTEMA OPERATIVO DE LUZ | 2026 
    </div>

</body>
</html>
