<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Aldo Angel | Portal de Luz</title>
    <style>
        body { background-color: #050505; color: #E0E0E0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }

        .boton-entrar:hover { background: #D4AF37; color: #000; }
        .footer-contacto { margin-top: 100px; padding: 30px; font-size: 0.9rem; color: #666; border-top: 1px solid #222; }

</head>
<body>

    <section class="hero">
        <h1>"Yo soy la puerta abierta que nadie puede cerrar"</h1>
        <p>Sanadora por orden del Altísimo.</p>
        <div class="sangre-nueva">Bienvenido al Sonido. La Nueva Era, la Sangre Nueva. 2ble AA, Naldo.</div>
        <button class="boton-entrar" onclick="alert('Entrando al Silencio...')">Entrar al Silencio</button>
    </section>

    <footer class="footer-contacto">
        <p>Si alguien tiene alguna duda, puede comunicarse conmigo.</p>
        <p>© 2026 Aldo Angel | Gloria a Al Alim</p>
    </footer>
